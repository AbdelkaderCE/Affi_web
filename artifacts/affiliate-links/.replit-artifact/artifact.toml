kind = "web"
previewPath = "/"
title = "Affiliate Links"
version = "1.0.0"
id = "artifacts/affiliate-links"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20399

[services.development]
run = "pnpm --filter @workspace/affiliate-links run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/affiliate-links", "run", "build" ]
publicDir = "artifacts/affiliate-links/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20399"
BASE_PATH = "/"
